version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: offermarket-db
    environment:
      POSTGRES_USER: offermarket
      POSTGRES_PASSWORD: offermarket
      POSTGRES_DB: offermarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offermarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (for caching, sessions)
  redis:
    image: redis:7-alpine
    container_name: offermarket-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
